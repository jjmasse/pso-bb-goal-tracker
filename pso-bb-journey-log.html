<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PSOBB Journey Log — FOnewm</title>
<style>
  :root {
    --bg-0: #060914;
    --bg-1: #0c1428;
    --bg-2: #142042;
    --line: #1f2c4f;
    --text: #d6e0ff;
    --text-dim: #8b97c1;
    --accent: #58e6ff;
    --accent-2: #ffb454;
    --legendary: #c9a4ff;
    --core: #58e6ff;
    --stretch: #6ee7a7;
    --done: #6ee7a7;
    --pending: #3a4670;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg-0); color: var(--text); font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  body {
    background:
      radial-gradient(circle at 20% 10%, rgba(88,230,255,0.08), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(201,164,255,0.08), transparent 40%),
      var(--bg-0);
    min-height: 100vh;
  }
  header {
    padding: 32px 32px 16px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 16px;
  }
  h1 {
    margin: 0;
    font-size: 26px;
    letter-spacing: 0.5px;
    background: linear-gradient(90deg, var(--accent), var(--legendary));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .subtitle { color: var(--text-dim); font-size: 13px; margin-top: 4px; }
  .header-actions { display: flex; gap: 8px; }
  button {
    background: var(--bg-2);
    color: var(--text);
    border: 1px solid var(--line);
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button.primary { background: var(--accent); color: var(--bg-0); border-color: var(--accent); font-weight: 600; }
  button.primary:hover { background: #7fefff; color: var(--bg-0); }

  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    padding: 24px 32px;
  }
  .stat-card {
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 16px;
  }
  .stat-card .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .stat-card .value { font-size: 28px; font-weight: 600; margin-top: 4px; }
  .stat-card .bar { height: 4px; background: var(--pending); border-radius: 2px; margin-top: 10px; overflow: hidden; }
  .stat-card .bar-fill { height: 100%; background: var(--done); transition: width 0.4s; }
  .stat-card.core .value { color: var(--core); }
  .stat-card.stretch .value { color: var(--stretch); }
  .stat-card.legendary .value { color: var(--legendary); }
  .stat-card.total .value { color: var(--accent-2); }

  .journey-feed {
    margin: 0 32px 24px;
    padding: 16px 20px;
    background: linear-gradient(135deg, rgba(88,230,255,0.08), rgba(201,164,255,0.05));
    border: 1px solid var(--line);
    border-radius: 8px;
  }
  .journey-feed h3 { margin: 0 0 12px; font-size: 14px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); }
  .feed-item { padding: 6px 0; font-size: 14px; border-bottom: 1px dashed var(--line); }
  .feed-item:last-child { border-bottom: none; }
  .feed-item .feed-date { color: var(--text-dim); font-size: 12px; margin-right: 10px; font-variant-numeric: tabular-nums; }
  .feed-item .feed-tier {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    margin-right: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }
  .feed-tier.core { background: rgba(88,230,255,0.15); color: var(--core); }
  .feed-tier.stretch { background: rgba(110,231,167,0.15); color: var(--stretch); }
  .feed-tier.legendary { background: rgba(201,164,255,0.15); color: var(--legendary); }
  .feed-empty { color: var(--text-dim); font-style: italic; font-size: 13px; }

  .tabs {
    display: flex;
    gap: 4px;
    padding: 0 32px;
    border-bottom: 1px solid var(--line);
  }
  .tab {
    padding: 12px 20px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-size: 14px;
    border-bottom: 2px solid transparent;
    border-radius: 0;
    font-weight: 500;
  }
  .tab:hover { color: var(--text); border-bottom-color: var(--line); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .count { font-size: 11px; color: var(--text-dim); margin-left: 6px; }
  .tab.active .count { color: var(--accent); }

  .tier-content { padding: 24px 32px 60px; }
  .tier-intro {
    color: var(--text-dim);
    font-size: 13px;
    font-style: italic;
    margin: 0 0 20px;
    max-width: 700px;
  }
  .category-section { margin-bottom: 28px; }
  .category-header { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 12px; }
  .goal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
  .goal-card {
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px 16px;
    transition: all 0.15s;
    position: relative;
  }
  .goal-card:hover { border-color: var(--text-dim); }
  .goal-card.achieved { background: linear-gradient(135deg, rgba(110,231,167,0.08), rgba(88,230,255,0.05)); border-color: rgba(110,231,167,0.3); }
  .goal-header { display: flex; align-items: flex-start; gap: 10px; }
  .goal-check {
    flex-shrink: 0;
    width: 22px; height: 22px;
    border: 2px solid var(--pending);
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    margin-top: 2px;
  }
  .goal-check:hover { border-color: var(--accent); }
  .goal-card.achieved .goal-check { background: var(--done); border-color: var(--done); }
  .goal-card.achieved .goal-check::after { content: "✓"; color: var(--bg-0); font-weight: 700; font-size: 14px; }
  .goal-body { flex: 1; min-width: 0; }
  .goal-title { font-weight: 600; font-size: 14px; line-height: 1.3; }
  .goal-card.achieved .goal-title { color: var(--done); }
  .goal-desc { font-size: 12px; color: var(--text-dim); margin-top: 4px; line-height: 1.5; }
  .goal-meta { font-size: 11px; color: var(--text-dim); margin-top: 8px; display: flex; justify-content: space-between; align-items: center; }
  .goal-note {
    margin-top: 8px;
    font-size: 12px;
    color: var(--text);
    background: rgba(0,0,0,0.25);
    border-left: 2px solid var(--accent);
    padding: 6px 10px;
    border-radius: 0 4px 4px 0;
    font-style: italic;
  }
  .goal-actions { font-size: 11px; color: var(--text-dim); cursor: pointer; }
  .goal-actions:hover { color: var(--accent); }
  .goal-edit { margin-top: 10px; display: none; }
  .goal-edit.open { display: block; }
  .goal-edit input, .goal-edit textarea {
    width: 100%;
    background: var(--bg-0);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 6px 8px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
    margin-bottom: 6px;
  }
  .goal-edit textarea { resize: vertical; min-height: 50px; }
  .goal-edit .edit-actions { display: flex; gap: 6px; }
  .goal-edit button { font-size: 11px; padding: 4px 10px; }
  .custom-badge { font-size: 9px; background: var(--bg-2); padding: 2px 5px; border-radius: 3px; color: var(--text-dim); margin-left: 6px; vertical-align: middle; }

  .add-goal {
    margin-top: 16px;
    padding: 16px;
    background: var(--bg-1);
    border: 1px dashed var(--line);
    border-radius: 8px;
  }
  .add-goal h4 { margin: 0 0 10px; font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .add-goal-row { display: grid; grid-template-columns: 1fr 1fr 2fr auto; gap: 8px; align-items: stretch; }
  .add-goal input {
    background: var(--bg-0);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
  }
  .add-goal input:focus { outline: none; border-color: var(--accent); }

  footer { text-align: center; padding: 30px; color: var(--text-dim); font-size: 12px; border-top: 1px solid var(--line); }

  @media (max-width: 720px) {
    header { padding: 20px; }
    .stats, .tabs, .tier-content, .journey-feed { padding-left: 16px; padding-right: 16px; margin-left: 8px; margin-right: 8px; }
    .add-goal-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>PSOBB Journey Log</h1>
    <div class="subtitle">FOnewm — milestones reached, not boxes to tick</div>
  </div>
  <div class="header-actions">
    <button onclick="exportData()">Export JSON</button>
    <button onclick="document.getElementById('importFile').click()">Import JSON</button>
    <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(event)">
    <button onclick="resetAll()">Reset</button>
  </div>
</header>

<div class="stats" id="stats"></div>

<div class="journey-feed">
  <h3>Recent Journey Entries</h3>
  <div id="feed"></div>
</div>

<div class="tabs" id="tabs"></div>
<div class="tier-content" id="tierContent"></div>

<footer>Single-file local tracker. State stored in your browser's localStorage. Export regularly to back up your journey.</footer>

<script>
// ============================================================
// SEED GOALS — curated for FOnewm play.
// Edit these or add custom goals via the in-app form.
// ============================================================
const SEED_GOALS = {
  core: {
    intro: "The baseline FOnewm path — what makes a Force feel realized. Aim to mark these off in your first hundred-ish hours.",
    items: [
      { id: 'c-lvl-50',   category: 'Character',  title: 'Reach Level 50',                       desc: 'Comfortable in Hard mode, techs starting to feel meaningful.' },
      { id: 'c-lvl-80',   category: 'Character',  title: 'Reach Level 80',                       desc: 'Eligible for Ultimate. The doorway to the real grind.' },
      { id: 'c-lvl-100',  category: 'Character',  title: 'Reach Level 100',                      desc: 'Triple digits. You are now officially In It.' },
      { id: 'c-quests-n', category: 'Quests',     title: 'All Ep1 government quests on Normal',  desc: 'The story bones of PSO. Worth doing once for the lore.' },
      { id: 'c-quests-h', category: 'Quests',     title: 'All Ep1 government quests on Hard',    desc: 'Same path, sharper teeth.' },
      { id: 'c-quests-vh',category: 'Quests',     title: 'All Ep1 government quests on Very Hard',desc: 'Where rare drops start mattering.' },
      { id: 'c-tech-sup', category: 'Techs',      title: 'Resta + Anti to Lv20',                 desc: 'Keep yourself and the team alive. Non-negotiable for FO.' },
      { id: 'c-tech-buff',category: 'Techs',      title: 'Shifta + Deband to Lv20',              desc: 'Your team will love you. Or at least notice you exist.' },
      { id: 'c-mag-100',  category: 'Mag',        title: 'Raise a Mag to Lv100',                 desc: 'Photon Blast unlocked. Choose your evolution path.' },
      { id: 'c-falz-n',   category: 'Bosses',     title: 'Defeat Dark Falz on Normal',           desc: 'First taste of the endgame loop.' },
      { id: 'c-falz-vh',  category: 'Bosses',     title: 'Defeat Dark Falz on Very Hard',        desc: 'A real fight. Earn the right to dream of Psycho Wand.' },
      { id: 'c-team-run', category: 'Team',       title: 'Clear a quest with a full Team party', desc: 'The reason multiplayer games exist.' },
    ]
  },
  stretch: {
    intro: "When you want a project. These are the goals that give a play session direction without feeling like homework.",
    items: [
      { id: 's-lvl-150',   category: 'Character', title: 'Reach Level 150',                      desc: 'Most Ultimate content opens up here.' },
      { id: 's-lvl-180',   category: 'Character', title: 'Reach Level 180',                      desc: 'Diminishing XP, increasing pride.' },
      { id: 's-tech-atk',  category: 'Techs',     title: 'All offensive techs to Lv30 (Foie/Barta/Zonde lines)', desc: 'Elemental coverage maxed. You can answer any room.' },
      { id: 's-tech-megid',category: 'Techs',     title: 'Master Megid (Lv30)',                  desc: 'Instant kill on the right enemies. FOnewm specialty.' },
      { id: 's-tech-grants',category:'Techs',     title: 'Master Grants (Lv30)',                 desc: 'Light-element nuke for the Ruins-flavored monsters.' },
      { id: 's-mag-200',   category: 'Mag',       title: 'Raise a Mag to Lv200',                 desc: 'Max stat-feeding pet. Your patience reified.' },
      { id: 's-mag-evo',   category: 'Mag',       title: 'Evolve a Sato or Nidra mag',           desc: 'Class-defining mag for FOnewm. Triple Photon Blast trigger.' },
      { id: 's-quests-ep2',category: 'Quests',    title: 'All Ep2 government quests on VH',      desc: 'Ep2 has the better atmosphere. Fight me.' },
      { id: 's-ttf',       category: 'Quests',    title: 'Complete Towards the Future',          desc: 'The XP firehose quest.' },
      { id: 's-speedrun',  category: 'Quests',    title: 'Sub-15min solo run of any government quest', desc: 'Pick one and beat it into submission.' },
      { id: 's-ult-first', category: 'Ultimate',  title: 'First Ultimate clear (any quest)',     desc: 'The mode you came for. Welcome.' },
      { id: 's-ult-derol', category: 'Ultimate',  title: 'Solo De Rol Le on Ultimate',           desc: 'The tutorial endgame. Solo it for honor.' },
      { id: 's-ult-volopt',category: 'Ultimate',  title: 'Solo Vol Opt on Ultimate',             desc: 'Mines run, but you live in it now.' },
      { id: 's-hunt-glide',category: 'Hunts',     title: 'Hunt: Glide Divine',                   desc: 'Solid wand for FO. A reasonable victory.' },
      { id: 's-hunt-summit',category:'Hunts',     title: 'Hunt: Summit Moon',                    desc: 'Rare rod, hits like a truck.' },
      { id: 's-hunt-club', category: 'Hunts',     title: 'Hunt: Club of Laconium',               desc: 'Fire-element club. Elemental coverage starts here.' },
      { id: 's-hunt-mark3',category: 'Hunts',     title: 'Hunt: Mark III',                       desc: 'Off-spec but iconic.' },
      { id: 's-team-carry',category: 'Team',      title: 'Carry a teammate through their first Ultimate clear', desc: 'Pay it forward. The Team levels up with you.' },
      { id: 's-id-tour',   category: 'Section ID',title: 'Level a 2nd character on a different ID to Lv80', desc: 'Open the alternate drop tables. Mules are friends.' },
      { id: 's-battle',    category: 'Modes',     title: 'Complete a Battle Mode match',          desc: 'PvP exists. Try it once at least.' },
    ]
  },
  legendary: {
    intro: "White whales. Some of these may take years. Marking even one is the kind of moment you remember.",
    items: [
      { id: 'l-psycho',    category: 'The Holy Grail', title: 'Psycho Wand',                     desc: 'Dark Falz drop on Ultimate, specific Section IDs. The defining FOnewm weapon.' },
      { id: 'l-twin-psy',  category: 'Hunts',     title: 'Twin Psychogun (FO usable)',           desc: 'One of the rarer FO-usable mech weapons. Pure flex.' },
      { id: 'l-lvl-200',   category: 'Character', title: 'Reach Level 200',                      desc: 'The cap. The grind\'s grind.' },
      { id: 'l-falz-solo', category: 'Ultimate',  title: 'Solo Ultimate Dark Falz',              desc: 'A FOnewm soloing Falz is a story you get to tell forever.' },
      { id: 'l-cm-s1',     category: 'Challenge', title: 'Challenge Mode: S-rank Ep1 Stage 1',   desc: 'Real test of party play and execution.' },
      { id: 'l-cm-full',   category: 'Challenge', title: 'Challenge Mode: complete all Ep1 stages', desc: 'A full season-of-Sundays project. Few finish it.' },
      { id: 'l-cent',      category: 'Stat Caps', title: 'Hunt a Centurion / Ability mag cell',  desc: 'Stat-wall breakers. Endgame min-maxing fuel.' },
      { id: 'l-volopt-1m', category: 'Speedrun',  title: 'Sub-1-minute Vol Opt clear',           desc: 'Comp gear, perfect cast routing. The tightest minute in PSO.' },
      { id: 'l-elem-wands',category: 'Hunts',     title: 'Every elemental wand at +Special grind', desc: 'Full elemental wardrobe. The completionist\'s tier.' },
      { id: 'l-pds',       category: 'Trading',   title: 'Earn enough Photon Drops for an S-rank trade', desc: 'The economy game. Slow gold, real reward.' },
    ]
  }
};

// ============================================================
// STATE
// ============================================================
const STORAGE_KEY = 'psobb-journey-log-v1';
let state = {
  achievements: {},   // { goalId: { achieved: bool, date: 'YYYY-MM-DD', note: '' } }
  customGoals: { core: [], stretch: [], legendary: [] }
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state = {
        achievements: parsed.achievements || {},
        customGoals: parsed.customGoals || { core: [], stretch: [], legendary: [] }
      };
    }
  } catch (e) {
    console.warn('Could not load saved state:', e);
  }
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch (e) { console.warn('Could not save state:', e); }
}

// ============================================================
// DATA HELPERS
// ============================================================
function allGoalsForTier(tier) {
  return [...SEED_GOALS[tier].items, ...state.customGoals[tier]];
}
function goalsByCategory(tier) {
  const items = allGoalsForTier(tier);
  const groups = {};
  for (const g of items) {
    if (!groups[g.category]) groups[g.category] = [];
    groups[g.category].push(g);
  }
  return groups;
}
function tierCounts(tier) {
  const items = allGoalsForTier(tier);
  const total = items.length;
  const done = items.filter(g => state.achievements[g.id]?.achieved).length;
  return { total, done };
}

// ============================================================
// RENDERING
// ============================================================
let activeTier = 'core';

function render() {
  renderStats();
  renderFeed();
  renderTabs();
  renderTier();
  saveState();
}

function renderStats() {
  const tiers = ['core', 'stretch', 'legendary'];
  let totalDone = 0, totalAll = 0;
  let html = '';
  for (const tier of tiers) {
    const { done, total } = tierCounts(tier);
    totalDone += done; totalAll += total;
    const pct = total ? (done / total * 100) : 0;
    const label = tier.charAt(0).toUpperCase() + tier.slice(1);
    html += `
      <div class="stat-card ${tier}">
        <div class="label">${label}</div>
        <div class="value">${done}<span style="color:var(--text-dim);font-size:18px;font-weight:400">/${total}</span></div>
        <div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
      </div>`;
  }
  const totalPct = totalAll ? (totalDone / totalAll * 100) : 0;
  html += `
    <div class="stat-card total">
      <div class="label">Total Milestones</div>
      <div class="value">${totalDone}<span style="color:var(--text-dim);font-size:18px;font-weight:400">/${totalAll}</span></div>
      <div class="bar"><div class="bar-fill" style="width:${totalPct}%;background:var(--accent-2)"></div></div>
    </div>`;
  document.getElementById('stats').innerHTML = html;
}

function renderFeed() {
  const entries = [];
  for (const tier of ['core', 'stretch', 'legendary']) {
    for (const g of allGoalsForTier(tier)) {
      const a = state.achievements[g.id];
      if (a?.achieved && a.date) entries.push({ ...g, tier, date: a.date, note: a.note || '' });
    }
  }
  entries.sort((a, b) => b.date.localeCompare(a.date));
  const recent = entries.slice(0, 6);
  const feed = document.getElementById('feed');
  if (recent.length === 0) {
    feed.innerHTML = '<div class="feed-empty">No milestones logged yet. Mark your first one — even something you already accomplished — to start the log.</div>';
    return;
  }
  feed.innerHTML = recent.map(e => `
    <div class="feed-item">
      <span class="feed-date">${e.date}</span>
      <span class="feed-tier ${e.tier}">${e.tier}</span>
      <strong>${escapeHtml(e.title)}</strong>
      ${e.note ? ` — <span style="color:var(--text-dim);font-style:italic">${escapeHtml(e.note)}</span>` : ''}
    </div>
  `).join('');
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  const tiers = [
    { id: 'core',      label: 'Core Path' },
    { id: 'stretch',   label: 'Stretch Goals' },
    { id: 'legendary', label: 'Legendary' }
  ];
  tabs.innerHTML = tiers.map(t => {
    const { done, total } = tierCounts(t.id);
    return `<button class="tab ${t.id === activeTier ? 'active' : ''}" onclick="setTier('${t.id}')">
      ${t.label}<span class="count">${done}/${total}</span>
    </button>`;
  }).join('');
}

function setTier(tier) { activeTier = tier; render(); }

function renderTier() {
  const container = document.getElementById('tierContent');
  const groups = goalsByCategory(activeTier);
  let html = `<p class="tier-intro">${SEED_GOALS[activeTier].intro}</p>`;
  for (const category of Object.keys(groups)) {
    html += `<div class="category-section">
      <div class="category-header">${escapeHtml(category)}</div>
      <div class="goal-grid">${groups[category].map(renderGoal).join('')}</div>
    </div>`;
  }
  html += renderAddGoalForm(activeTier);
  container.innerHTML = html;
}

function renderGoal(g) {
  const a = state.achievements[g.id] || {};
  const isAchieved = !!a.achieved;
  const isCustom = state.customGoals[activeTier].some(cg => cg.id === g.id);
  const dateVal = a.date || new Date().toISOString().slice(0, 10);
  const noteVal = a.note || '';
  return `
    <div class="goal-card ${isAchieved ? 'achieved' : ''}" id="card-${g.id}">
      <div class="goal-header">
        <div class="goal-check" onclick="toggleAchieved('${g.id}')"></div>
        <div class="goal-body">
          <div class="goal-title">${escapeHtml(g.title)}${isCustom ? '<span class="custom-badge">custom</span>' : ''}</div>
          <div class="goal-desc">${escapeHtml(g.desc || '')}</div>
          ${a.note ? `<div class="goal-note">${escapeHtml(a.note)}</div>` : ''}
          <div class="goal-meta">
            <span>${a.date ? 'Achieved ' + a.date : '&nbsp;'}</span>
            <span class="goal-actions" onclick="toggleEdit('${g.id}')">${isAchieved ? 'edit note' : 'add details'}</span>
          </div>
          <div class="goal-edit" id="edit-${g.id}">
            <input type="date" id="date-${g.id}" value="${dateVal}">
            <textarea id="note-${g.id}" placeholder="What happened? Memorable detail, party, drop info...">${escapeHtml(noteVal)}</textarea>
            <div class="edit-actions">
              <button class="primary" onclick="saveDetails('${g.id}')">Save</button>
              <button onclick="toggleEdit('${g.id}')">Cancel</button>
              ${isCustom ? `<button onclick="deleteCustom('${g.id}')" style="margin-left:auto;color:#ff8a8a">Delete goal</button>` : ''}
            </div>
          </div>
        </div>
      </div>
    </div>`;
}

function renderAddGoalForm(tier) {
  return `
    <div class="add-goal">
      <h4>Add a custom ${tier} goal</h4>
      <div class="add-goal-row">
        <input id="new-cat-${tier}" placeholder="Category (e.g. Hunts)">
        <input id="new-title-${tier}" placeholder="Goal title">
        <input id="new-desc-${tier}" placeholder="Short description (optional)">
        <button class="primary" onclick="addCustomGoal('${tier}')">Add</button>
      </div>
    </div>`;
}

// ============================================================
// ACTIONS
// ============================================================
function toggleAchieved(id) {
  const cur = state.achievements[id] || {};
  if (cur.achieved) {
    state.achievements[id] = { achieved: false };
  } else {
    state.achievements[id] = {
      achieved: true,
      date: cur.date || new Date().toISOString().slice(0, 10),
      note: cur.note || ''
    };
  }
  render();
}
function toggleEdit(id) {
  const el = document.getElementById('edit-' + id);
  if (el) el.classList.toggle('open');
}
function saveDetails(id) {
  const date = document.getElementById('date-' + id).value;
  const note = document.getElementById('note-' + id).value;
  const cur = state.achievements[id] || {};
  state.achievements[id] = { achieved: cur.achieved || true, date, note };
  toggleEdit(id);
  render();
}
function addCustomGoal(tier) {
  const cat = document.getElementById('new-cat-' + tier).value.trim() || 'Custom';
  const title = document.getElementById('new-title-' + tier).value.trim();
  const desc = document.getElementById('new-desc-' + tier).value.trim();
  if (!title) { alert('Title required'); return; }
  const id = 'custom-' + Date.now();
  state.customGoals[tier].push({ id, category: cat, title, desc });
  render();
}
function deleteCustom(id) {
  if (!confirm('Delete this custom goal? Achievement record will also be removed.')) return;
  for (const tier of ['core', 'stretch', 'legendary']) {
    state.customGoals[tier] = state.customGoals[tier].filter(g => g.id !== id);
  }
  delete state.achievements[id];
  render();
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'psobb-journey-' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!confirm('Replace your current journey log with the imported one?')) return;
      state = {
        achievements: data.achievements || {},
        customGoals: data.customGoals || { core: [], stretch: [], legendary: [] }
      };
      render();
    } catch (err) { alert('Invalid JSON file'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}
function resetAll() {
  if (!confirm('Wipe all journey data and start over? This cannot be undone (export first if unsure).')) return;
  state = { achievements: {}, customGoals: { core: [], stretch: [], legendary: [] } };
  render();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

loadState();
render();
</script>
</body>
</html>
